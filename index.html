<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Palawan · March 2027</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Space+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#000;height:100%;overflow:hidden;font-family:'Space Mono',monospace;}

/* CONTAINER */
#reel{
  position:fixed;inset:0;
  background:#000;
}

/* VIDEO */
#video-el{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  transition:opacity 0.6s ease;
}
#video-el.fade{opacity:0;}

/* GRADIENT */
.grad-top{
  position:absolute;top:0;left:0;right:0;height:30%;
  background:linear-gradient(to bottom,rgba(0,0,0,0.55),transparent);
  pointer-events:none;z-index:2;
}
.grad-bot{
  position:absolute;bottom:0;left:0;right:0;height:50%;
  background:linear-gradient(to top,rgba(0,0,0,0.85),transparent);
  pointer-events:none;z-index:2;
}

/* PROGRESS BAR */
#progress-track{
  position:absolute;top:0;left:0;right:0;
  display:flex;gap:3px;padding:12px 12px 0;
  padding-top:calc(12px + env(safe-area-inset-top,0px));
  z-index:10;
}
.prog-seg{
  flex:1;height:2px;border-radius:2px;
  background:rgba(255,255,255,0.25);
  overflow:hidden;
}
.prog-fill{
  height:100%;width:0%;
  background:#fff;
  transition:none;
}
.prog-seg.done .prog-fill{width:100%;}
.prog-seg.active .prog-fill{
  animation:fill-bar linear forwards;
}
@keyframes fill-bar{from{width:0%;}to{width:100%;}}

/* TOP LABEL */
#top-label{
  position:absolute;
  top:calc(32px + env(safe-area-inset-top,0px));
  left:0;right:0;
  text-align:center;
  z-index:10;
  opacity:0;
  transition:opacity 0.4s ease;
}
#top-label.show{opacity:1;}
#top-label .tl-crew{
  font-size:0.52rem;letter-spacing:0.22em;text-transform:uppercase;
  color:rgba(255,255,255,0.6);margin-bottom:3px;
}
#top-label .tl-date{
  font-size:0.56rem;letter-spacing:0.18em;text-transform:uppercase;
  color:#05e8d8;
}

/* CAPTION */
#caption{
  position:absolute;
  bottom:calc(90px + env(safe-area-inset-bottom,0px));
  left:0;right:0;
  padding:0 20px;
  z-index:10;
}
#caption-loc{
  font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;
  color:#05e8d8;margin-bottom:6px;
  opacity:0;transform:translateY(8px);
  transition:opacity 0.4s ease 0.15s,transform 0.4s ease 0.15s;
}
#caption-loc.show{opacity:1;transform:translateY(0);}
#caption-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2.4rem,10vw,4rem);
  font-weight:300;line-height:0.95;
  color:#fff;
  text-shadow:0 2px 20px rgba(0,0,0,0.5);
  opacity:0;transform:translateY(12px);
  transition:opacity 0.5s ease 0.25s,transform 0.5s ease 0.25s;
}
#caption-title.show{opacity:1;transform:translateY(0);}
#caption-title em{font-style:italic;color:#e8d5a3;}

/* CTA */
#cta{
  position:absolute;
  bottom:calc(20px + env(safe-area-inset-bottom,0px));
  left:20px;right:20px;
  z-index:10;
  opacity:0;
  transition:opacity 0.5s ease;
}
#cta.show{opacity:1;}
#cta-btn{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.25);
  border-radius:14px;padding:14px 18px;
  cursor:pointer;
  transition:transform 0.15s,background 0.2s;
  -webkit-tap-highlight-color:transparent;
}
#cta-btn:active{transform:scale(0.97);background:rgba(255,255,255,0.18);}
.cta-left .cta-sub{
  font-size:0.48rem;letter-spacing:0.14em;text-transform:uppercase;
  color:rgba(255,255,255,0.55);margin-bottom:3px;
}
.cta-left .cta-main{
  font-family:'Cormorant Garamond',serif;
  font-size:1.25rem;font-weight:300;color:#fff;
}
.cta-left .cta-main em{font-style:italic;color:#e8d5a3;}
.cta-arrow{
  width:36px;height:36px;border-radius:50%;
  border:1px solid rgba(255,255,255,0.3);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}

/* TAP ZONES */
#tap-prev{position:absolute;top:0;left:0;bottom:0;width:35%;z-index:5;}
#tap-next{position:absolute;top:0;right:0;bottom:0;width:65%;z-index:5;}

/* MUTE BTN */
#mute-btn{
  position:absolute;top:calc(38px + env(safe-area-inset-top,0px));
  right:16px;z-index:11;
  width:32px;height:32px;border-radius:50%;
  background:rgba(0,0,0,0.4);backdrop-filter:blur(8px);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:0.9rem;
}
</style>
</head>
<body>

<div id="reel">
  <!-- Progress -->
  <div id="progress-track"></div>

  <!-- Top label -->
  <div id="top-label">
    <div class="tl-crew">The Crew · Trip 02</div>
    <div class="tl-date">March 2027</div>
  </div>

  <!-- Gradients -->
  <div class="grad-top"></div>
  <div class="grad-bot"></div>

  <!-- Video -->
  <video id="video-el" playsinline muted autoplay preload="auto"></video>

  <!-- Mute -->
  <button id="mute-btn" onclick="toggleMute()">🔇</button>

  <!-- Tap zones -->
  <div id="tap-prev" onclick="prevClip()"></div>
  <div id="tap-next" onclick="nextClip()"></div>

  <!-- Caption -->
  <div id="caption">
    <div id="caption-loc"></div>
    <div id="caption-title"></div>
  </div>

  <!-- CTA -->
  <div id="cta">
    <div id="cta-btn" onclick="openPlan()">
      <div class="cta-left">
        <div class="cta-sub">13 nights · ~$2,044 per person</div>
        <div class="cta-main">See the <em>full plan</em></div>
      </div>
      <div class="cta-arrow">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 7h8M7 3l4 4-4 4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
  </div>
</div>

<script>
const clips = [
  {id:'29809264', loc:'El Nido · Palawan', title:'The Lagoon<br>Awaits.'},
  {id:'33719624', loc:'Bacuit Bay · Philippines', title:'Hidden<br><em>Lagoons</em>'},
  {id:'36306550', loc:'Limestone Cliffs · El Nido', title:'200m<br><em>Walls</em>'},
  {id:'33111252', loc:'El Nido Beach · Philippines', title:'White<br><em>Sand</em>'},
  {id:'31565670', loc:'Secret Lagoon · Palawan', title:'No<br><em>Boats Inside</em>'},
  {id:'33702519', loc:'Drone · El Nido · Palawan', title:'From<br><em>Above</em>'},
  {id:'35346691', loc:'Philippines · South Sea', title:'March<br><em>2027</em>'},
  {id:'36306698', loc:'Island Hopping · El Nido', title:'Your<br><em>Private Boat</em>'},
];

let current = 0;
let timer = null;
let muted = true;
const DURATION = 5000; // 5s per clip

const video = document.getElementById('video-el');
const locEl = document.getElementById('caption-loc');
const titleEl = document.getElementById('caption-title');
const ctaEl = document.getElementById('cta');
const topLabel = document.getElementById('top-label');
const track = document.getElementById('progress-track');
const muteBtn = document.getElementById('mute-btn');

// Build progress segments
clips.forEach((_, i) => {
  const seg = document.createElement('div');
  seg.className = 'prog-seg';
  seg.innerHTML = '<div class="prog-fill"></div>';
  track.appendChild(seg);
});

function getSegs(){ return track.querySelectorAll('.prog-seg'); }

function showClip(idx) {
  if(idx >= clips.length){ showCTA(); return; }
  current = idx;
  const clip = clips[idx];

  // Update progress
  const segs = getSegs();
  segs.forEach((s,i) => {
    s.className = 'prog-seg';
    const fill = s.querySelector('.prog-fill');
    fill.style.animation = 'none';
    fill.style.width = i < idx ? '100%' : '0%';
  });
  const active = segs[idx];
  active.classList.add('active');
  const fill = active.querySelector('.prog-fill');
  fill.style.animation = `fill-bar ${DURATION}ms linear forwards`;

  // Fade video
  video.classList.add('fade');
  setTimeout(() => {
    const src = `https://videos.pexels.com/video-files/${clip.id}/${clip.id}-hd_720.mp4`;
    if(video.src !== src){ video.src = src; video.load(); }
    video.play().catch(()=>{});
    video.classList.remove('fade');
  }, 300);

  // Hide captions
  locEl.classList.remove('show');
  titleEl.classList.remove('show');
  topLabel.classList.remove('show');
  // Keep CTA visible once it's appeared (clip 4+)
  if(idx < 3) ctaEl.classList.remove('show');

  // Show captions after brief delay
  setTimeout(() => {
    locEl.textContent = clip.loc;
    titleEl.innerHTML = clip.title;
    locEl.classList.add('show');
    titleEl.classList.add('show');
    topLabel.classList.add('show');
    // Show CTA from clip 4 onward
    if(idx >= 3) ctaEl.classList.add('show');
  }, 500);

  // Auto advance
  clearTimeout(timer);
  timer = setTimeout(() => showClip(current + 1), DURATION);
}

function showCTA(){
  // Last clip stays, show CTA
  ctaEl.classList.add('show');
  // Reset to loop after 3s if no tap
  timer = setTimeout(() => showClip(0), 8000);
}

function nextClip(){
  clearTimeout(timer);
  showClip(current + 1);
}

function prevClip(){
  clearTimeout(timer);
  showClip(Math.max(0, current - 1));
}

function toggleMute(){
  muted = !muted;
  video.muted = muted;
  muteBtn.textContent = muted ? '🔇' : '🔊';
  if(!muted) video.play().catch(()=>{});
}

function openPlan(){
  // Link to the main palawan plan
  window.location.href = './plan.html';
}

// Start
showClip(0);

// Preload next video
video.addEventListener('timeupdate', () => {
  if(video.duration && video.currentTime > video.duration - 2){
    const next = current + 1;
    if(next < clips.length){
      const preload = document.createElement('link');
      preload.rel = 'preload';
      preload.as = 'video';
      preload.href = `https://videos.pexels.com/video-files/${clips[next].id}/${clips[next].id}-hd_720.mp4`;
      document.head.appendChild(preload);
    }
  }
});
</script>
</body>
</html>
